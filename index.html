<div id="root"></div>

<div id="sync-bar">
<span>💾 localStorage</span>
<button class="sb sb-blue" onclick="exportData()">⬇ Export JSON</button>
<button class="sb sb-green" onclick="document.getElementById('import-input').click()">⬆ Import JSON</button>
<button class="sb sb-red" onclick="clearData()">🗑 Clear</button>
</div>
<script>
function skFor(profileId) {
const p = profileId ? profileId + ':' : '';
return {
meals: p + 'nutrition-meals-v2',
db: p + 'nutrition-db-v1',
recipes: p + 'nutrition-recipes-v1',
mealRec: p + 'nutrition-meal-recipes-v1',
calc: p + 'nutrition-calc-v1',
};
}
const PROFILES_KEY = 'nutrition-profiles-v1';
const ACTIVE_KEY = 'nutrition-active-profile';
const LANG_KEY = 'nutrition-lang';
function exportData() {
const activeId = localStorage.getItem(ACTIVE_KEY) || 'default';
const pl = localStorage.getItem(PROFILES_KEY);
const profiles = pl ? JSON.parse(pl) : [];
const activeProfile = profiles.find(p => p.id === activeId) || profiles[0];
if (!activeProfile) return;
const sk = skFor(activeProfile.id);
const profileData = {};
Object.entries(sk).forEach(([k,v]) => {
const val = localStorage.getItem(v);
if (val) profileData[k] = JSON.parse(val);
});
const data = {
_exported: new Date().toISOString(),
_profile: activeProfile,
[PROFILES_KEY]: [activeProfile],
profiles: { [activeProfile.id]: profileData }
};
const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
const url = URL.createObjectURL(blob);
const a = document.createElement('a');
a.href = url; a.download = `nutrition-${activeProfile.name}-${new Date().toISOString().slice(0,10)}.json`;
a.click(); URL.revokeObjectURL(url);
}
document.getElementById('import-input').addEventListener('change', function(e) {
const file = e.target.files[0]; if (!file) return;
const reader = new FileReader();
reader.onload = function(ev) {
try {
const data = JSON.parse(ev.target.result);
if (!data.profiles || !data._profile) { alert('Invalid file: missing profile data'); return; }
const importedProfile = data._profile;
const pid = importedProfile.id;
// merge into existing profiles list
const existing = JSON.parse(localStorage.getItem(PROFILES_KEY) || '[]');
const idx = existing.findIndex(p => p.id === pid);
if (idx >= 0) existing[idx] = importedProfile;
else existing.push(importedProfile);
localStorage.setItem(PROFILES_KEY, JSON.stringify(existing));
// write profile data
const profileData = data.profiles[pid];
if (profileData) {
const sk = skFor(pid);
Object.entries(sk).forEach(([k,v]) => {
if (profileData[k] !== undefined) localStorage.setItem(v, JSON.stringify(profileData[k]));
});
}
// switch to imported profile
localStorage.setItem(ACTIVE_KEY, pid);
alert(`Profile "${importedProfile.name}" imported! Reloading…`);
location.reload();
} catch(err) { alert('Invalid file: ' + err.message); }
};
reader.readAsText(file); this.value = '';
});
function clearData() {
if (!confirm('Clear ALL data for all profiles?')) return;
const keys = Object.keys(localStorage).filter(k =>
k.startsWith('nutrition-') || k.includes(':nutrition-')
);
keys.forEach(k => localStorage.removeItem(k));
location.reload();
}
</script>

// cal завжди рахується з макросів: p*4 + f*9 + c*4
function macrosToCal(p,f,c) { return Math.round(p*4 + f*9 + c*4); }

function getFoodName(key, t, db) {
  if (db && db[key] && db[key].displayName) return db[key].displayName;
  return t.foodNames[key] || key;
}
function calcFood(key, amount, db) {
const food = db[key];
if (!food) return { cal:0,p:0,f:0,c:0 };
const g = food.unit==="pcs" ? amount*(food.gPerPc||100) : amount;
const m = g/100;
const p=rnd(food.p*m), f=rnd(food.f*m), c=rnd(food.c*m);
return { cal:macrosToCal(p,f,c), p, f, c };
}
function rnd(v) { return Math.round(v*10)/10; }
function sumMacros(items) {
return items.reduce((a,b)=>({ cal:a.cal+b.cal, p:rnd(a.p+b.p), f:rnd(a.f+b.f), c:rnd(a.c+b.c) }),{cal:0,p:0,f:0,c:0});
}

const DayTotal = ({ mealsList, mealRecsList, recipes, gymDay, db, t, calcData }) => {
const ingM=mealsList.flat().map(it=>calcFood(it.key,it.amount,db));
const recM=(mealRecsList||[]).flatMap(mrl=>(mrl||[]).map(mr=>{ const r=recipes.find(x=>x.id===mr.id); if(!r) return {cal:0,p:0,f:0,c:0}; const tt=calcRecipeMacros(r,db); return {cal:Math.round(tt.cal*mr.scale),p:rnd(tt.p*mr.scale),f:rnd(tt.f*mr.scale),c:rnd(tt.c*mr.scale)}; }));
const tot=sumMacros([...ingM,...recM]);
const isUk=t.dayTotal==="РАЗОМ ЗА ДЕНЬ";

// Compute targets from calcData if available
let calTarget=null, targetMacros=null;
if(calcData) {
  const {weight,age,height,sex,workType,gymDaysPerWeek,gymDurationMin,gymIntensity,walkingMinPerDay,walkingPace,goal,goalAmount,proteinPerKg,fatPct} = calcData;
  const bmr = Math.round(sex==="male" ? 10*weight+6.25*height-5*age+5 : 10*weight+6.25*height-5*age-161);
  const workMET={sedentary:1.2,light:1.375,moderate:1.55};
  const baseActivity = bmr*((workMET[workType]||1.2)-1);
  const gymMET={light:4,moderate:6,vigorous:8};
  const gymKcalPerSession=Math.round((gymMET[gymIntensity]||6)*weight*(gymDurationMin/60));
  const walkMET={slow:2.5,moderate:3.5,fast:4.5};
  const walkKcalPerDay=Math.round((walkMET[walkingPace]||3.5)*weight*(walkingMinPerDay/60));
  const tdeeGym=Math.round(bmr+baseActivity+gymKcalPerSession+walkKcalPerDay);
  const tdeeRest=Math.round(bmr+baseActivity+walkKcalPerDay);
  const sign=goal==="surplus"?1:goal==="maintain"?0:-1;
  const targetGym=tdeeGym+sign*(goal==="maintain"?0:goalAmount);
  const targetRest=tdeeRest+sign*(goal==="maintain"?0:Math.round(goalAmount*0.7));
  calTarget=gymDay?targetGym:targetRest;
  const pG=Math.round(weight*proteinPerKg);
  const fKcal=Math.round(calTarget*fatPct/100);
  const fG=Math.round(fKcal/9);
  const cG=Math.round(Math.max(0,calTarget-pG*4-fKcal)/4);
  targetMacros={p:pG,f:fG,c:cG,cal:calTarget};
}

// fallback hardcoded targets if no calcData
const displayTarget = calTarget ?? (gymDay?2648:2341);
const calOk=Math.abs(tot.cal-displayTarget)/displayTarget<0.05;
const calHigh=tot.cal>displayTarget*1.05;
const diffCal=tot.cal-displayTarget;

return (
<div style={{background:"#060d1a",borderRadius:14,padding:"16px 18px",border:`1px solid ${C.border}`,display:"grid",gap:14}}>

  {/* Current totals */}
  <div>
  <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:1.5,marginBottom:10}}>{t.dayTotal}</div>
  <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
  <div style={{textAlign:"center"}}>
    <div style={{fontSize:28,fontWeight:900,color:calOk?C.green:calHigh?C.red:C.amber}}>{tot.cal}</div>
    <div style={{fontSize:10,color:C.muted,fontWeight:600}}>{t.calories}</div>
    <div style={{fontSize:10,color:C.muted}}>{t.target}: {displayTarget.toLocaleString()}</div>
  </div>
  {[
    [t.protein, tot.p, C.blue],
    [t.fat,     tot.f, C.amber],
    [t.carbs,   tot.c, C.green],
  ].map(([l,v,col])=>(
    <div key={l} style={{textAlign:"center"}}>
      <div style={{fontSize:28,fontWeight:900,color:col}}>{v}g</div>
      <div style={{fontSize:10,color:C.muted,fontWeight:600}}>{l}</div>
      {targetMacros&&<div style={{fontSize:10,color:col}}>/{targetMacros[l===t.protein?"p":l===t.fat?"f":"c"]}g</div>}
    </div>
  ))}
  </div>
  <div style={{marginTop:10}}><MacroBar p={tot.p} f={tot.f} c={tot.c}/></div>
  </div>

  {/* Targets + comparison — shown only if calcData saved */}
  {targetMacros&&(
  <div style={{borderTop:`1px solid ${C.border}`,paddingTop:12,display:"grid",gap:8}}>
    <div style={{fontSize:10,fontWeight:700,color:C.muted,letterSpacing:1}}>{isUk?"🎯 ЦІЛІ З КАЛЬКУЛЯТОРА":"🎯 TARGETS FROM CALCULATOR"}</div>

    {/* Target macros row */}
    <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
      {[
        [t.calories, targetMacros.cal, C.text],
        [t.protein,  targetMacros.p+"g", C.blue],
        [t.fat,      targetMacros.f+"g", C.amber],
        [t.carbs,    targetMacros.c+"g", C.green],
      ].map(([l,v,col])=>(
        <div key={l} style={{textAlign:"center"}}>
          <div style={{fontSize:18,fontWeight:800,color:col}}>{v}</div>
          <div style={{fontSize:9,color:C.muted}}>{l}</div>
        </div>
      ))}
    </div>

    {/* Difference */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:C.card,borderRadius:8,padding:"8px 12px"}}>
      <span style={{fontSize:12,color:C.muted}}>{isUk?"Різниця:":"Difference:"}</span>
      <span style={{fontSize:16,fontWeight:800,color:Math.abs(diffCal)<100?C.green:Math.abs(diffCal)<200?C.amber:C.red}}>
        {diffCal>0?"+":""}{diffCal} {isUk?"ккал":"kcal"}
      </span>
      <span style={{fontSize:11,color:Math.abs(diffCal)<100?C.green:Math.abs(diffCal)<200?C.amber:C.red}}>
        {Math.abs(diffCal)<100?(isUk?"✓ норма":"✓ on track"):Math.abs(diffCal)<200?(isUk?"скоригувати":"adjust"):(isUk?"переглянути":"review")}
      </span>
    </div>

    {/* Macro diffs */}
    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
      {[
        [t.protein, tot.p, targetMacros.p, C.blue],
        [t.fat,     tot.f, targetMacros.f, C.amber],
        [t.carbs,   tot.c, targetMacros.c, C.green],
      ].map(([l,actual,target,col])=>{
        const diff=Math.round((actual-target)*10)/10;
        return (
          <div key={l} style={{flex:1,background:C.card,borderRadius:8,padding:"6px 10px",textAlign:"center",minWidth:70}}>
            <div style={{fontSize:9,color:C.muted,marginBottom:2}}>{l}</div>
            <div style={{fontSize:13,fontWeight:700,color:Math.abs(diff)<5?C.green:col}}>
              {diff>0?"+":""}{diff}g
            </div>
          </div>
        );
      })}
    </div>
  </div>
  )}

  {!calcData&&(
    <div style={{fontSize:10,color:C.muted,borderTop:`1px solid ${C.border}`,paddingTop:8}}>
      {isUk?"💡 Збережіть дані у вкладці ⚡ Калькулятор для порівняння з цілями":"💡 Save data in ⚡ Calculator tab to compare with targets"}
    </div>
  )}
</div>
);
};

const rt=t.recipes;
const [name,setName]=useState(recipe?.name||"");
const [emoji,setEmoji]=useState(recipe?.emoji||"🍲");
const [ings,setIngs]=useState(deepClone(recipe?.ingredients||[]));

const ShopTab = ({ gymMeals, restMeals, gymMealRecs, restMealRecs, recipes, db, t }) => {
const sh=t.shop;
const [gymDays,setGymDays]=useState(4);
const [restDays,setRestDays]=useState(3);
const allKeys=new Set([...gymMeals.flat().map(i=>i.key),...restMeals.flat().map(i=>i.key)]);
(gymMealRecs||[]).flat().forEach(mr=>{ const r=recipes.find(x=>x.id===mr.id); if(r) r.ingredients.forEach(i=>allKeys.add(i.key)); });
(restMealRecs||[]).flat().forEach(mr=>{ const r=recipes.find(x=>x.id===mr.id); if(r) r.ingredients.forEach(i=>allKeys.add(i.key)); });
const rows=Array.from(allKeys).map(key=>{
const food=db[key]; if(!food) return null;
const gymAmt=gymMeals.flat().filter(i=>i.key===key).reduce((s,i)=>s+i.amount,0)
+(gymMealRecs||[]).flat().reduce((s,mr)=>{ const r=recipes.find(x=>x.id===mr.id); if(!r) return s; return s+r.ingredients.filter(i=>i.key===key).reduce((ss,i)=>ss+i.amount*mr.scale,0); },0);
const restAmt=restMeals.flat().filter(i=>i.key===key).reduce((s,i)=>s+i.amount,0)
+(restMealRecs||[]).flat().reduce((s,mr)=>{ const r=recipes.find(x=>x.id===mr.id); if(!r) return s; return s+r.ingredients.filter(i=>i.key===key).reduce((ss,i)=>ss+i.amount*mr.scale,0); },0);
const weekly=Math.round(gymAmt*gymDays+restAmt*restDays);
if(weekly===0) return null;
return { key, name:getFoodName(key,t,db), unit:food.unit, gymAmt:Math.round(gymAmt), restAmt:Math.round(restAmt), weekly };
}).filter(Boolean).sort((a,b)=>b.weekly-a.weekly);
return (
<div style={{display:"grid",gap:12}}>
<div style={{background:C.card,borderRadius:12,padding:"12px 16px",border:`1px solid ${C.border}`,display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
<div><div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:6}}>{sh.gymDays}</div><NumInp value={gymDays} onChange={setGymDays} min={0} style={{width:60}}/></div>
<div><div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:6}}>{sh.restDays}</div><NumInp value={restDays} onChange={setRestDays} min={0} style={{width:60}}/></div>
<div style={{gridColumn:"1/-1",fontSize:10,color:C.muted}}>{sh.total} {gymDays+restDays} {sh.daysPerWeek} {gymDays+restDays!==7&&sh.adjustWeek}</div>
</div>
<div style={{fontSize:11,color:C.muted}}>{sh.hint(gymDays,restDays)}</div>
<div style={{background:C.card,borderRadius:12,overflow:"hidden",border:`1px solid ${C.border}`}}>
<div style={{display:"grid",gridTemplateColumns:"1fr 70px 70px 80px",gap:8,padding:"8px 14px",borderBottom:`1px solid ${C.border}`,fontSize:10,fontWeight:700,color:C.muted,letterSpacing:1}}>
<span>{sh.item}</span><span style={{textAlign:"center"}}>{sh.gymDay}</span><span style={{textAlign:"center"}}>{sh.restDay}</span><span style={{textAlign:"right"}}>{sh.weekly}</span>
</div>
{rows.map(r=>(
<div key={r.key} style={{display:"grid",gridTemplateColumns:"1fr 70px 70px 80px",gap:8,padding:"9px 14px",borderBottom:`1px solid #0f172a`,alignItems:"center"}}>
<span style={{fontSize:13,fontWeight:600,color:C.text}}>{r.name}</span>
<span style={{fontSize:12,color:C.muted,textAlign:"center"}}>{r.gymAmt>0?`${r.gymAmt}${r.unit}`:"—"}</span>
<span style={{fontSize:12,color:C.muted,textAlign:"center"}}>{r.restAmt>0?`${r.restAmt}${r.unit}`:"—"}</span>
<span style={{fontSize:13,fontWeight:700,color:C.green,textAlign:"right"}}>{r.weekly}{r.unit}</span>
</div>
))}
</div>
</div>
);
};

const FoodTab = ({ db, onUpdateFood, onResetFood, onResetAllFoods, onAddFood, onDeleteFood, t }) => {
const ft=t.food;
const isUk = !!t.foodNames.rice && t.foodNames.rice.includes('и');
const [search,setSearch]=useState("");
const [filterCat,setFilterCat]=useState("all");
const [showAdd,setShowAdd]=useState(false);
const EMPTY_FOOD = {name:"",p:0,f:0,c:0,unit:"g",gPerPc:100,cat:""};
const [newFood,setNewFood]=useState(EMPTY_FOOD);
const updNew=(k,v)=>setNewFood(p=>({...p,[k]:v}));

// collect all categories including custom ones from db
const allCats = ["all",...Array.from(new Set(Object.values(db).map(f=>f.cat).filter(Boolean)))];
const catLabels = isUk
  ? {all:"Всі",grains:"Крупи",protein:"Білки",dairy:"Молочні",fats:"Жири",vegetables:"Овочі",fruits:"Фрукти",other:"Інше"}
  : {all:"All",grains:"Grains",protein:"Protein",dairy:"Dairy",fats:"Fats",vegetables:"Vegetables",fruits:"Fruits",other:"Other"};

const keys=Object.keys(db).filter(k=>{
  const food=db[k];
  const name=(food.displayName||getFoodName(k,t,db)).toLowerCase();
  const matchSearch=name.includes(search.toLowerCase());
  const matchCat=filterCat==="all"||food.cat===filterCat;
  return matchSearch&&matchCat;
});

const handleAdd=()=>{
  if(!newFood.name.trim()) return;
  const key=newFood.name.trim().toLowerCase().replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,"")+`_${genUid()}`;
  const food={p:newFood.p,f:newFood.f,c:newFood.c,unit:newFood.unit,label:"custom",cat:newFood.cat||"other",displayName:newFood.name.trim()};
  if(newFood.unit==="pcs") food.gPerPc=newFood.gPerPc;
  onAddFood(key,food);
  setNewFood(EMPTY_FOOD);
  setShowAdd(false);
};

const newCalPreview = macrosToCal(newFood.p,newFood.f,newFood.c);

return (
<div style={{display:"grid",gap:10}}>
<div style={{display:"flex",gap:8,alignItems:"center"}}>
<Inp value={search} onChange={setSearch} placeholder={ft.searchFood} style={{flex:1}}/>
<button onClick={()=>setShowAdd(v=>!v)} style={btnStyle(C.green,false)}>{showAdd?"✕":ft.addNew}</button>
<button onClick={onResetAllFoods} style={btnStyle(C.amber,false)}>{ft.resetAll}</button>
</div>

{/* Category filter */}
<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
{allCats.map(cat=>(
<button key={cat} onClick={()=>setFilterCat(cat)}
  style={{...btnStyle(filterCat===cat?C.blue:C.muted,true),fontSize:11,padding:"3px 8px"}}>
  {catLabels[cat]||cat}
</button>
))}
</div>

{/* Add new food form */}
{showAdd&&(
<div style={{background:C.card,borderRadius:12,padding:"14px 16px",border:`1px solid ${C.green}44`,display:"grid",gap:10}}>
<Inp value={newFood.name} onChange={v=>updNew("name",v)} placeholder={ft.foodName}/>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
{[[ft.proteinG,"p",0.1],[ft.fatG,"f",0.1],[ft.carbsG,"c",0.1]].map(([l,k,st])=>(
<div key={k}>
<div style={{fontSize:9,color:C.muted,marginBottom:3,fontWeight:700,letterSpacing:0.5}}>{l}</div>
<NumInp value={newFood[k]} onChange={v=>updNew(k,v)} step={st} style={{width:"100%"}}/>
</div>
))}
</div>
<div style={{background:C.inputBg,borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<span style={{fontSize:11,color:C.muted}}>{ft.kcal} (auto)</span>
<span style={{fontSize:16,fontWeight:800,color:C.text}}>{newCalPreview} kcal</span>
</div>
<div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
<span style={{fontSize:11,color:C.muted}}>{isUk?"Одиниця:":"Unit:"}</span>
{[["g",ft.unitG],["ml",ft.unitMl],["pcs",ft.unitPcs]].map(([u,l])=>(
<button key={u} onClick={()=>updNew("unit",u)} style={{...btnStyle(newFood.unit===u?C.blue:C.muted,false),fontSize:11}}>{l}</button>
))}
{newFood.unit==="pcs"&&(
<div style={{display:"flex",alignItems:"center",gap:6}}>
<span style={{fontSize:11,color:C.muted}}>{ft.gPerPc}:</span>
<NumInp value={newFood.gPerPc} onChange={v=>updNew("gPerPc",v)} min={1} style={{width:60}}/>
</div>
)}

<div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
<span style={{fontSize:11,color:C.muted}}>{isUk?"Категорія:":"Category:"}</span>
{Object.entries(catLabels).filter(([k])=>k!=="all").map(([k,l])=>(
<button key={k} onClick={()=>updNew("cat",k)}
  style={{...btnStyle(newFood.cat===k?C.teal:C.muted,true),fontSize:11,padding:"3px 8px"}}>
  {l}
</button>
))}
</div>
<button onClick={handleAdd} style={{...btnStyle(C.green,false),textAlign:"center"}}>{ft.addBtn}</button>
</div>
)}

{/* Food list */}
{keys.map(key=>{
const food=db[key]; const orig=ORIGINAL_DB[key];
const isCustom=!orig, isModified=orig&&(food.p!==orig.p||food.f!==orig.f||food.c!==orig.c);
const calPer100=macrosToCal(food.p,food.f,food.c);
const displayName=food.displayName||getFoodName(key,t,db);
return (
<div key={key} style={{background:C.card,borderRadius:12,padding:"12px 14px",border:`1px solid ${isCustom?C.purple+"44":isModified?C.amber+"44":C.border}`}}>

<div>
<div style={{fontSize:13,fontWeight:700,color:isCustom?C.purple:isModified?C.amber:C.text}}>
{displayName}{food.label&&<span style={{fontSize:10,color:C.muted,marginLeft:5}}>({food.label})</span>}
</div>
<div style={{display:"flex",gap:6,marginTop:3,flexWrap:"wrap"}}>
{food.cat&&<span style={{fontSize:10,color:C.teal,background:C.teal+"18",borderRadius:4,padding:"1px 6px"}}>{catLabels[food.cat]||food.cat}</span>}
<span style={{fontSize:10,color:C.muted}}>{ft.perUnit(food.unit)}</span>

</div>
<div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>

</div>
<div style={{display:"grid",gridTemplateColumns:"auto 1fr 1fr 1fr",gap:6,alignItems:"end"}}>
<div style={{background:C.inputBg,borderRadius:6,padding:"6px 10px",textAlign:"center"}}>
<div style={{fontSize:9,color:C.muted,marginBottom:2,fontWeight:700}}>{ft.kcal}</div>
<div style={{fontSize:15,fontWeight:800,color:C.text}}>{calPer100}</div>
</div>
{[[ft.proteinG,"p"],[ft.fatG,"f"],[ft.carbsG,"c"]].map(([l,k])=>(
<div key={k}>
<div style={{fontSize:9,color:C.muted,marginBottom:3,fontWeight:700,letterSpacing:0.5}}>{l}</div>
<NumInp value={food[k]} onChange={v=>onUpdateFood(key,k,v)} step={0.1} style={{width:"100%"}}/>
</div>
))}
</div>
</div>
);
})}
</div>
);
};

proteinPerKg:2.0, fatPct:30,
};

const CalcTab = ({ calcData, onSave, gymMeals, restMeals, gymMealRecs, restMealRecs, recipes, db, t }) => {
const [d, setD] = useState(calcData || CALC_DEFAULTS);
const upd = (k,v) => setD(p=>({...p,[k]:v}));

// BMR — Mifflin-St Jeor
const bmr = Math.round(
  d.sex==="male"
    ? 10*d.weight + 6.25*d.height - 5*d.age + 5
    : 10*d.weight + 6.25*d.height - 5*d.age - 161
);

// Activity breakdown
const workMET = { sedentary:1.2, light:1.375, moderate:1.55 };
const workFactor = workMET[d.workType] || 1.2;
const baseActivity = bmr * (workFactor - 1);

// Gym: MET ~6 moderate, ~8 vigorous
const gymMET = { light:4, moderate:6, vigorous:8 };
const gymKcalPerSession = Math.round((gymMET[d.gymIntensity]||6) * d.weight * (d.gymDurationMin/60));
const gymKcalPerDay = Math.round(gymKcalPerSession * d.gymDaysPerWeek / 7);

// Walking: MET ~3.5 moderate pace
const walkMET = { slow:2.5, moderate:3.5, fast:4.5 };
const walkKcalPerDay = Math.round((walkMET[d.walkingPace]||3.5) * d.weight * (d.walkingMinPerDay/60));

const tdeeGym = Math.round(bmr + baseActivity + gymKcalPerSession + walkKcalPerDay);
const tdeeRest = Math.round(bmr + baseActivity + walkKcalPerDay);
const tdeeAvg = Math.round(tdeeGym*(d.gymDaysPerWeek/7) + tdeeRest*((7-d.gymDaysPerWeek)/7));

const sign = d.goal==="surplus" ? 1 : d.goal==="maintain" ? 0 : -1;
const targetGym = tdeeGym + sign*d.goalAmount;
const targetRest = tdeeRest + sign*(d.goal==="maintain"?0:Math.round(d.goalAmount*0.7));

// Macros
const proteinG = Math.round(d.weight * d.proteinPerKg);
const proteinKcal = proteinG * 4;
const fatKcalGym = Math.round(targetGym * d.fatPct / 100);
const fatGGym = Math.round(fatKcalGym / 9);
const carbKcalGym = Math.max(0, targetGym - proteinKcal - fatKcalGym);
const carbGGym = Math.round(carbKcalGym / 4);
const fatKcalRest = Math.round(targetRest * d.fatPct / 100);
const fatGRest = Math.round(fatKcalRest / 9);
const carbKcalRest = Math.max(0, targetRest - proteinKcal - fatKcalRest);
const carbGRest = Math.round(carbKcalRest / 4);

// Current diet comparison
const calcMealTotal = (mealsList, mealRecsList) => {
  const ingM = (mealsList||[]).flat().map(it=>calcFood(it.key,it.amount,db));
  const recM = (mealRecsList||[]).flatMap(mrl=>(mrl||[]).map(mr=>{
    const r=recipes.find(x=>x.id===mr.id); if(!r) return {cal:0,p:0,f:0,c:0};
    const tt=calcRecipeMacros(r,db);
    return {cal:Math.round(tt.cal*mr.scale),p:rnd(tt.p*mr.scale),f:rnd(tt.f*mr.scale),c:rnd(tt.c*mr.scale)};
  }));
  return sumMacros([...ingM,...recM]);
};
const currentGym = calcMealTotal(gymMeals, gymMealRecs);
const currentRest = calcMealTotal(restMeals, restMealRecs);

<div style={{fontSize:10,color:C.amber,textAlign:"center"}}>{t.uncooked}</div>
{gymKeys.map((mk,i)=>(
<MealCard key={mk} metaKey={mk} items={meals.gym[i]||[]} mealRecs={(mealRecs.gym||[])[i]||[]} recipes={recipes} db={db} builtinItems={BUILTIN.gym[i]} onAmountChange={(uid,v)=>updateAmount("gym",i,uid,v)} onRemoveItem={uid=>removeItem("gym",i,uid)} onAddItem={key=>addItem("gym",i,key)} onAddRecipe={id=>addRecipeToMeal("gym",i,id)} onRemoveRecipe={uid=>removeRecipeFromMeal("gym",i,uid)} onScaleRecipe={(uid,s)=>scaleRecipeInMeal("gym",i,uid,s)} onRestoreBuiltin={()=>restoreBuiltin("gym",i)} t={t}/>
))}
<DayTotal mealsList={meals.gym} mealRecsList={mealRecs.gym||[]} recipes={recipes} gymDay={true} db={db} t={t} calcData={calcData}/>
</div>
)}
{tab==="rest"&&(
<div style={{display:"grid",gap:14,animation:"fadeIn 0.2s ease"}}>
<div style={{fontSize:10,color:C.muted,textAlign:"center",letterSpacing:1}}>{t.restSchedule} · {t.deficit("440")}</div>
<div style={{fontSize:10,color:C.amber,textAlign:"center"}}>{t.uncooked}</div>
{restKeys.map((mk,i)=>(
<MealCard key={mk} metaKey={mk} items={meals.rest[i]||[]} mealRecs={(mealRecs.rest||[])[i]||[]} recipes={recipes} db={db} builtinItems={BUILTIN.rest[i]} onAmountChange={(uid,v)=>updateAmount("rest",i,uid,v)} onRemoveItem={uid=>removeItem("rest",i,uid)} onAddItem={key=>addItem("rest",i,key)} onAddRecipe={id=>addRecipeToMeal("rest",i,id)} onRemoveRecipe={uid=>removeRecipeFromMeal("rest",i,uid)} onScaleRecipe={(uid,s)=>scaleRecipeInMeal("rest",i,uid,s)} onRestoreBuiltin={()=>restoreBuiltin("rest",i)} t={t}/>
))}
<DayTotal mealsList={meals.rest} mealRecsList={mealRecs.rest||[]} recipes={recipes} gymDay={false} db={db} t={t} calcData={calcData}/>
</div>
)}
{tab==="supp"&&<SuppsTab t={t}/>}
{tab==="shop"&&<ShopTab gymMeals={meals.gym} restMeals={meals.rest} gymMealRecs={mealRecs.gym||[]} restMealRecs={mealRecs.rest||[]} recipes={recipes} db={db} t={t}/>}
{tab==="food"&&<FoodTab db={db} onUpdateFood={updateFood} onResetFood={resetFood} onResetAllFoods={resetAllFoods} onAddFood={addFoodToDb} onDeleteFood={deleteFood} t={t}/>}
{tab==="recipes"&&<RecipesTab db={db} recipes={recipes} onSaveRecipe={saveRecipe} onDeleteRecipe={deleteRecipe} onAddFood={addFoodToDb} t={t}/>}
{tab==="calc"&&<CalcTab calcData={calcData} onSave={setCalcData} gymMeals={meals.gym} restMeals={meals.rest} gymMealRecs={mealRecs.gym||[]} restMealRecs={mealRecs.rest||[]} recipes={recipes} db={db} t={t}/>}
</div>
);
};

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
