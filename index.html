  <button class="sb sb-red" onclick="clearData()">🗑 Clear</button>

<script>
// ── Storage key prefix builder (profile-aware) ──
function skFor(profileId) {
  const p = profileId ? profileId + ':' : '';
  return {
    meals:   p + 'nutrition-meals-v2',
    db:      p + 'nutrition-db-v1',
    recipes: p + 'nutrition-recipes-v1',
    mealRec: p + 'nutrition-meal-recipes-v1',
  };
}
// profiles list key — global, not per-profile
const PROFILES_KEY = 'nutrition-profiles-v1';
const ACTIVE_KEY   = 'nutrition-active-profile';
const LANG_KEY     = 'nutrition-lang';

function exportData() {
  const data = { _exported: new Date().toISOString(), profiles: {} };
  // export global profiles list
  const pl = localStorage.getItem(PROFILES_KEY);
  if (pl) data[PROFILES_KEY] = JSON.parse(pl);
  // export all profile data
  const profiles = pl ? JSON.parse(pl) : [];
  profiles.forEach(pr => {
    const sk = skFor(pr.id);
    data.profiles[pr.id] = {};
    Object.entries(sk).forEach(([k,v]) => {
      const val = localStorage.getItem(v);
      if (val) data.profiles[pr.id][k] = JSON.parse(val);
    });
  });
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `nutrition-plan-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
}

document.getElementById('import-input').addEventListener('change', function(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (data[PROFILES_KEY]) localStorage.setItem(PROFILES_KEY, JSON.stringify(data[PROFILES_KEY]));
      if (data.profiles) {
        Object.entries(data.profiles).forEach(([pid, pdata]) => {
          const sk = skFor(pid);
          Object.entries(sk).forEach(([k,v]) => {
            if (pdata[k]) localStorage.setItem(v, JSON.stringify(pdata[k]));
          });
        });
      }
      alert('Import successful! Reloading…');
      location.reload();
    } catch(err) { alert('Invalid file: ' + err.message); }
  };
  reader.readAsText(file); this.value = '';
});

function clearData() {
  if (!confirm('Clear ALL data for all profiles?')) return;
  // clear everything with our known prefixes
  const keys = Object.keys(localStorage).filter(k =>
    k.startsWith('nutrition-') || k.includes(':nutrition-')
  );
  keys.forEach(k => localStorage.removeItem(k));
  location.reload();
}
</script>

function calcFood(key, amount, db) {
  const food = db[key];
  if (!food) return { cal:0,p:0,f:0,c:0 };
  const g = food.unit==="pcs" ? amount*(food.gPerPc||100) : amount;

  return { cal:Math.round(food.cal*m), p:rnd(food.p*m), f:rnd(food.f*m), c:rnd(food.c*m) };
}

const Inp=({value,onChange,placeholder,style={}})=>(
  <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
    style={{background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:6,color:C.text,fontSize:13,padding:"7px 10px",outline:"none",width:"100%",boxSizing:"border-box",...style}}/>
);
const NumInp=({value,onChange,step=1,min=0,style={}})=>(
  <input type="number" value={value} min={min} step={step}
    onChange={e=>onChange(Math.max(min,parseFloat(e.target.value)||0))}
    style={{background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:6,color:C.text,fontSize:13,fontWeight:700,padding:"5px 6px",textAlign:"center",outline:"none",...style}}/>
);

function calcRecipeMacros(recipe, db) {
  return sumMacros((recipe.ingredients||[]).map(i=>calcFood(i.key,i.amount,db)));
}

          {profiles.map(pr=>(

// ─── FOOD PICKER ──────────────────────────────────────────────────────────────

    <div style={{background:C.inputBg,border:`1px solid ${col}55`,borderRadius:10,padding:"12px 14px",marginTop:4,display:"grid",gap:8}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:12,fontWeight:700,color:col}}>{t.addFoodToMeal}</div>
        <button onClick={onClose} style={{background:"transparent",border:"none",color:C.muted,fontSize:16,cursor:"pointer"}}>✕</button>
      </div>
      <Inp value={search} onChange={setSearch} placeholder={t.searchFood}/>

// ─── INGREDIENT ROW ───────────────────────────────────────────────────────────
const IngRow = ({ item, db, isBuiltin, onAmountChange, onRemove, t }) => {
  const food=db[item.key]; const m=calcFood(item.key,item.amount,db);
  const unit=food?.unit||"g", step=unit==="pcs"?1:item.key==="olive_oil"?5:unit==="ml"?50:5;
  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr 110px auto",gap:8,padding:"8px 0",borderBottom:`1px solid #0f172a`,alignItems:"center"}}>
      <div>
        <div style={{fontSize:13,color:isBuiltin?"#cbd5e1":C.purple,fontWeight:isBuiltin?400:600}}>
          {getFoodName(item.key,t)}{food?.label&&<span style={{color:C.muted,fontSize:11,marginLeft:4}}>({food.label})</span>}
          {!isBuiltin&&<span style={{fontSize:10,color:C.purple,marginLeft:5}}>{t.added}</span>}
        </div>
        <div style={{fontSize:11,color:C.muted,marginTop:1}}>{m.cal} cal · P:{m.p}g · F:{m.f}g · C:{m.c}g</div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:4}}>
        <input type="number" value={item.amount} min={0} step={step} onChange={e=>onAmountChange(Math.max(0,Number(e.target.value)))}
          style={{width:62,background:C.inputBg,outline:"none",border:`1px solid ${C.border}`,borderRadius:6,color:C.text,fontSize:14,fontWeight:700,padding:"5px 6px",textAlign:"center"}}/>
        <span style={{fontSize:12,color:C.muted,minWidth:22}}>{unit}</span>
      </div>
      <button onClick={onRemove} style={{...btnStyle(C.red),padding:"5px 8px",fontSize:13,lineHeight:1}}>×</button>
    </div>
  );
};

// ─── RECIPE ROW (inside meal) ─────────────────────────────────────────────────
const RecipeRow = ({ recipe, db, scaleFactor, onScaleChange, onRemove, t }) => {
  const [open,setOpen]=useState(false);
  const base=calcRecipeMacros(recipe,db);
  const sc={cal:Math.round(base.cal*scaleFactor),p:rnd(base.p*scaleFactor),f:rnd(base.f*scaleFactor),c:rnd(base.c*scaleFactor)};
  return (
    <div style={{border:`1px solid ${C.teal}44`,borderRadius:10,overflow:"hidden",marginTop:4}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 110px 80px",gap:8,padding:"8px 10px",alignItems:"center",background:C.inputBg+"88"}}>
        <div onClick={()=>setOpen(o=>!o)} style={{cursor:"pointer",userSelect:"none"}}>
          <div style={{fontSize:13,fontWeight:700,color:C.teal}}>{recipe.emoji} {recipe.name}</div>
          <div style={{fontSize:10,color:C.muted,marginTop:1}}>{t.ingredientsCount(recipe.ingredients.length)} · {sc.cal} cal · P:{sc.p}g F:{sc.f}g C:{sc.c}g</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <NumInp value={scaleFactor} onChange={onScaleChange} step={0.1} min={0.1} style={{width:52}}/><span style={{fontSize:11,color:C.muted}}>{t.scale}</span>
        </div>
        <div style={{display:"flex",gap:4,justifyContent:"flex-end"}}>
          <button onClick={()=>setOpen(o=>!o)} style={{...btnStyle(C.teal),fontSize:12}}>{open?"▾":"▸"}</button>
          <button onClick={onRemove} style={btnStyle(C.red)}>×</button>
        </div>
      </div>
      {open&&(
        <div style={{padding:"6px 10px 10px",borderTop:`1px solid ${C.teal}22`}}>
          {recipe.ingredients.map((ing,i)=>{
            const food=db[ing.key]; if(!food) return null;
            const m=calcFood(ing.key,ing.amount*scaleFactor,db);
            return <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:i<recipe.ingredients.length-1?`1px solid ${C.inputBg}`:"none"}}>
              <span style={{fontSize:11,color:"#94a3b8"}}>{getFoodName(ing.key,t)}</span>
              <span style={{fontSize:10,color:C.muted}}>{rnd(ing.amount*scaleFactor)}{food.unit} · {m.cal} cal P:{m.p}g F:{m.f}g C:{m.c}g</span>
            </div>;
          })}
          <MacroBar p={sc.p} f={sc.f} c={sc.c}/>
        </div>
      )}
    </div>
  );
};

// ─── RECIPE PICKER ────────────────────────────────────────────────────────────

  const filtered=recipes.filter(r=>r.name.toLowerCase().includes(search.toLowerCase()));

};

// ─── MEAL CARD ────────────────────────────────────────────────────────────────
const MealCard = ({ metaKey, items, mealRecs, recipes, db, builtinItems, onAmountChange, onRemoveItem, onAddItem, onAddRecipe, onRemoveRecipe, onScaleRecipe, onRestoreBuiltin, t }) => {
  const [open,setOpen]=useState(true);
  const [showFoodPick,setShowFoodPick]=useState(false);
  const [showRecipePick,setShowRecipePick]=useState(false);
  const itemMacros=items.map(it=>calcFood(it.key,it.amount,db));
  const recMacros=(mealRecs||[]).map(mr=>{ const r=recipes.find(x=>x.id===mr.id); if(!r) return {cal:0,p:0,f:0,c:0}; const tt=calcRecipeMacros(r,db); return {cal:Math.round(tt.cal*mr.scale),p:rnd(tt.p*mr.scale),f:rnd(tt.f*mr.scale),c:rnd(tt.c*mr.scale)}; });
  const total=sumMacros([...itemMacros,...recMacros]);
  const isModified=items.length!==builtinItems.length||items.some((it,i)=>it.key!==builtinItems[i]?.key||it.amount!==builtinItems[i]?.amount);
  const usedKeys=items.map(i=>i.key);
  const hasRec=(mealRecs||[]).length>0;
  const hasAdded=items.some(it=>!BUILTIN_UIDS.has(it.uid));
  return (
    <div style={{background:C.card,borderRadius:14,overflow:"hidden",border:`1px solid ${isModified?C.amber+"66":C.border}`}}>
      <div onClick={()=>setOpen(o=>!o)} style={{padding:"14px 16px",cursor:"pointer",userSelect:"none",display:"flex",justifyContent:"space-between",alignItems:"center",background:open?"transparent":"#0f172a"}}>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:2}}>{MEAL_EMOJIS[metaKey]} {MEAL_TIMES[metaKey]}</div>
          <div style={{fontSize:16,fontWeight:800,color:C.text}}>{t.mealLabels[metaKey]||metaKey}</div>
          <div style={{fontSize:11,color:C.muted,marginTop:2}}>
            {t.mealNotes[metaKey]}
            {hasAdded&&<span style={{color:C.purple,marginLeft:6}}>· edited</span>}
            {hasRec&&<span style={{color:C.teal,marginLeft:6}}>+{mealRecs.length}</span>}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
          <MacroPills p={total.p} f={total.f} c={total.c}/>
          <div style={{textAlign:"right",minWidth:44}}><div style={{fontSize:17,fontWeight:900,color:isModified?C.amber:C.text}}>{total.cal}</div><div style={{fontSize:10,color:C.muted}}>cal</div></div>
          <div style={{width:26,height:26,borderRadius:7,background:C.inputBg,border:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontSize:12,flexShrink:0,transform:open?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.2s"}}>▾</div>
        </div>
      </div>
      {open&&(
        <div style={{borderTop:`1px solid ${C.border}`,padding:"4px 16px 14px"}}>
          {items.map(it=><IngRow key={it.uid} item={it} db={db} isBuiltin={BUILTIN_UIDS.has(it.uid)} onAmountChange={v=>onAmountChange(it.uid,v)} onRemove={()=>onRemoveItem(it.uid)} t={t}/>)}
          <div style={{marginTop:8}}>
            <button onClick={()=>{setShowFoodPick(v=>!v);setShowRecipePick(false);}} style={{...btnStyle(C.purple,false),fontSize:12}}>{showFoodPick?t.hide:t.addFood}</button>
            {showFoodPick&&<FoodPicker db={db} excludeKeys={usedKeys} onAdd={key=>{onAddItem(key);setShowFoodPick(false);}} onClose={()=>setShowFoodPick(false)} t={t} accentColor={C.purple}/>}
          </div>
          {(mealRecs||[]).map(mr=>{ const r=recipes.find(x=>x.id===mr.id); if(!r) return null; return <RecipeRow key={mr.uid} recipe={r} db={db} scaleFactor={mr.scale} onScaleChange={v=>onScaleRecipe(mr.uid,v)} onRemove={()=>onRemoveRecipe(mr.uid)} t={t}/>; })}
          <div style={{marginTop:6}}>
            <button onClick={()=>{setShowRecipePick(v=>!v);setShowFoodPick(false);}} style={{...btnStyle(C.teal,false),fontSize:12}}>{showRecipePick?t.hide:t.addRecipe}</button>
            {showRecipePick&&recipes.length===0&&<div style={{fontSize:12,color:C.muted,marginTop:6}}>{t.noRecipesYet}</div>}
            {showRecipePick&&recipes.length>0&&<RecipePicker recipes={recipes} db={db} onAdd={id=>{onAddRecipe(id);setShowRecipePick(false);}} onClose={()=>setShowRecipePick(false)} t={t}/>}
          </div>
          <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.border}`,display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
            <MacroPills p={total.p} f={total.f} c={total.c}/>
            <div style={{flex:1}}><MacroBar p={total.p} f={total.f} c={total.c}/></div>
            {isModified&&<button onClick={onRestoreBuiltin} style={btnStyle(C.amber)}>{t.restoreDefaults}</button>}
          </div>
        </div>
      )}
    </div>
  );
};

// ─── DAY TOTAL ────────────────────────────────────────────────────────────────
const DayTotal = ({ mealsList, mealRecsList, recipes, gymDay, db, t }) => {
  const ingM=mealsList.flat().map(it=>calcFood(it.key,it.amount,db));
  const recM=(mealRecsList||[]).flatMap(mrl=>(mrl||[]).map(mr=>{ const r=recipes.find(x=>x.id===mr.id); if(!r) return {cal:0,p:0,f:0,c:0}; const tt=calcRecipeMacros(r,db); return {cal:Math.round(tt.cal*mr.scale),p:rnd(tt.p*mr.scale),f:rnd(tt.f*mr.scale),c:rnd(tt.c*mr.scale)}; }));
  const tot=sumMacros([...ingM,...recM]);
  const calTarget=gymDay?2648:2341;
  const calOk=Math.abs(tot.cal-calTarget)/calTarget<0.05, calHigh=tot.cal>calTarget*1.05;
  return (
    <div style={{background:"#060d1a",borderRadius:14,padding:"16px 18px",border:`1px solid ${C.border}`}}>
      <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:1.5,marginBottom:4}}>{t.dayTotal}</div>
      <div style={{fontSize:10,color:C.muted,marginBottom:12}}>{t.tdee(gymDay?"620":"440",calTarget.toLocaleString())}</div>
      <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:28,fontWeight:900,color:calOk?C.green:calHigh?C.red:C.amber}}>{tot.cal}</div>
          <div style={{fontSize:10,color:C.muted,fontWeight:600}}>{t.calories}</div>
          <div style={{fontSize:10,color:C.muted}}>{t.target}: {calTarget.toLocaleString()}</div>
        </div>
        {[[t.protein,tot.p,C.blue,"≥200g"],[t.fat,tot.f,C.amber,"≤95g"],[t.carbs,tot.c,C.green,gymDay?"≥230g":"≥180g"]].map(([l,v,col,tgt])=>(
          <div key={l} style={{textAlign:"center"}}>
            <div style={{fontSize:28,fontWeight:900,color:col}}>{v}g</div>
            <div style={{fontSize:10,color:C.muted,fontWeight:600}}>{l}</div>
            <div style={{fontSize:10,color:col}}>{tgt}</div>
          </div>
        ))}
      </div>
      <div style={{marginTop:10}}><MacroBar p={tot.p} f={tot.f} c={tot.c}/></div>
    </div>
  );
};

// ─── RECIPE EDITOR ────────────────────────────────────────────────────────────
const RecipeEditor = ({ recipe, db, onSave, onCancel, onAddFood, t }) => {
  const rt=t.recipes;
  const [name,setName]=useState(recipe?.name||"");
  const [emoji,setEmoji]=useState(recipe?.emoji||"🍲");
  const [ings,setIngs]=useState(deepClone(recipe?.ingredients||[]));
  const [showPick,setShowPick]=useState(false);
  const [newFood,setNewFood]=useState(null);
  const [search,setSearch]=useState("");
  const dbKeys=Object.keys(db);
  const filtered=dbKeys.filter(k=>(getFoodName(k,t)).toLowerCase().includes(search.toLowerCase())&&!ings.find(i=>i.key===k));
  const tot=sumMacros(ings.map(ing=>calcFood(ing.key,ing.amount,db)));
  const addIng=key=>{const food=db[key];setIngs(p=>[...p,{key,amount:food.unit==="pcs"?1:100}]);setSearch("");setShowPick(false);};
  const saveNewFood=()=>{
    if(!newFood.name.trim()) return;
    const key=newFood.name.trim().toLowerCase().replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,"")+`_${genUid()}`;
    onAddFood(key,{cal:newFood.cal,p:newFood.p,f:newFood.f,c:newFood.c,unit:newFood.unit,label:"custom"});
    setIngs(p=>[...p,{key,amount:newFood.unit==="pcs"?1:100}]);
    setNewFood(null);setShowPick(false);
  };
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:C.surface,borderRadius:16,width:"100%",maxWidth:520,maxHeight:"90vh",overflowY:"auto",border:`1px solid ${C.border}`}}>
        <div style={{padding:"16px 18px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:16,fontWeight:800,color:C.teal}}>🍳 {recipe?rt.editTitle:rt.newTitle}</div>
          <button onClick={onCancel} style={{background:"transparent",border:"none",color:C.muted,fontSize:20,cursor:"pointer"}}>✕</button>
        </div>
        <div style={{padding:18,display:"grid",gap:14}}>
          <div style={{display:"flex",gap:8}}>
            <input value={emoji} onChange={e=>setEmoji(e.target.value)} maxLength={2} style={{width:52,background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,fontSize:22,padding:"6px",textAlign:"center",outline:"none",flexShrink:0}}/>
            <Inp value={name} onChange={setName} placeholder={rt.newTitle+"…"} style={{fontSize:15,fontWeight:700}}/>
          </div>
          <div>
            <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:1,marginBottom:8}}>{rt.ingredients}</div>
            {ings.length===0&&<div style={{fontSize:12,color:C.muted,padding:"8px 0"}}>{rt.noIngredients}</div>}
            {ings.map((ing,idx)=>{
              const food=db[ing.key]; if(!food) return null;
              const m=calcFood(ing.key,ing.amount,db);
              const step=food.unit==="pcs"?1:ing.key==="olive_oil"?5:food.unit==="ml"?50:5;
              return <div key={idx} style={{display:"grid",gridTemplateColumns:"1fr 90px 32px",gap:8,padding:"7px 0",borderBottom:`1px solid ${C.inputBg}`,alignItems:"center"}}>
                <div><div style={{fontSize:13,color:C.text,fontWeight:600}}>{getFoodName(ing.key,t)}</div><div style={{fontSize:10,color:C.muted}}>{m.cal} cal · P:{m.p}g · F:{m.f}g · C:{m.c}g</div></div>
                <div style={{display:"flex",alignItems:"center",gap:4}}><NumInp value={ing.amount} onChange={v=>setIngs(p=>p.map((x,i)=>i===idx?{...x,amount:v}:x))} step={step} style={{width:52}}/><span style={{fontSize:11,color:C.muted}}>{food.unit}</span></div>
                <button onClick={()=>setIngs(p=>p.filter((_,i)=>i!==idx))} style={{background:"transparent",border:"none",color:C.red,fontSize:16,cursor:"pointer",padding:0}}>×</button>
              </div>;
            })}
          </div>
          {ings.length>0&&<div style={{background:C.card,borderRadius:10,padding:"10px 14px",border:`1px solid ${C.border}`}}>
            <div style={{fontSize:10,color:C.muted,fontWeight:700,marginBottom:8}}>{rt.recipeTotal}</div>
            <MacroPills p={tot.p} f={tot.f} c={tot.c} cal={tot.cal}/><MacroBar p={tot.p} f={tot.f} c={tot.c}/>
          </div>}
          <div style={{border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>

const SHOP_CATS=[
  {label:"🥩 Proteins",keys:["pork_chop","eggs","greek_yogurt","cottage","kefir","protein_pwd"]},
  {label:"🍚 Carbs",keys:["rice","sweet_potato","potatoes","banana"]},

function fmtAmt(a,u){if(!a)return"—";if(u==="pcs")return`${a} pcs`;if(u==="ml")return`${a} ml`;return`${a} g`;}
const ShoppingTab=({meals,db,t})=>{
  const [gymDays,setGymDays]=useState(4);
  const [restDays,setRestDays]=useState(3);
  const st=t.shop;
  const agg=dt=>{const out={};(meals[dt]||[]).forEach(mealItems=>mealItems.forEach(it=>{out[it.key]=(out[it.key]||0)+it.amount;}));return out;};
  const gym=agg("gym"),rest=agg("rest");
  const allKeys=[...new Set([...Object.keys(gym),...Object.keys(rest)])];
  const DayBtn=({value,selected,onClick})=><button onClick={onClick} style={{width:34,height:34,borderRadius:8,border:"none",cursor:"pointer",fontWeight:700,fontSize:13,background:selected?C.blue:C.inputBg,color:selected?"#fff":C.muted}}>{value}</button>;
  return(
    <div style={{display:"grid",gap:14}}>
      <div style={{background:C.card,borderRadius:12,padding:"14px 16px",border:`1px solid ${C.border}`}}>
        <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:1,marginBottom:12}}>{st.daysPerWeek}</div>
        <div style={{display:"flex",gap:20,flexWrap:"wrap"}}>
          {[[st.gymDays,gymDays,setGymDays,restDays,setRestDays],[st.restDays,restDays,setRestDays,gymDays,setGymDays]].map(([lbl,val,set,other,setOther],idx)=>(
            <div key={idx}><div style={{fontSize:11,color:C.muted,marginBottom:6}}>{lbl}</div><div style={{display:"flex",gap:5}}>{[1,2,3,4,5,6,7].map(d=><DayBtn key={d} value={d} selected={val===d} onClick={()=>{set(d);if(d+other>7)setOther(7-d);}}/>)}</div></div>
          ))}
        </div>
        <div style={{marginTop:10,fontSize:12,color:C.muted}}>{st.total} <strong style={{color:gymDays+restDays===7?C.green:C.amber}}>{gymDays+restDays} days</strong>{gymDays+restDays!==7&&<span style={{color:C.amber}}> {st.adjustWeek}</span>}</div>
      </div>
      <div style={{background:C.card,borderRadius:12,padding:"12px 16px",border:`1px solid ${C.border}`,fontSize:12,color:"#94a3b8"}}>{st.hint(gymDays,restDays)}</div>
      {SHOP_CATS.map((cat,ci)=>{
        const keys=cat.keys.filter(k=>(gym[k]||0)+(rest[k]||0)>0);
        if(ci===SHOP_CATS.length-1){const catKeys=SHOP_CATS.flatMap(c=>c.keys);allKeys.filter(k=>!catKeys.includes(k)&&((gym[k]||0)+(rest[k]||0)>0)).forEach(k=>keys.push(k));}
        if(!keys.length) return null;
        return <div key={ci} style={{background:C.card,borderRadius:12,overflow:"hidden",border:`1px solid ${C.border}`}}>
          <div style={{padding:"10px 16px",background:"#0f172a",fontSize:13,fontWeight:700,color:C.text}}>{cat.label}</div>
          <div style={{padding:"0 16px"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr auto auto auto",gap:"0 10px",padding:"6px 0",borderBottom:`1px solid ${C.border}`}}>
              {[[st.item,"left"],[st.gymDay,"right"],[st.restDay,"right"],[st.weekly,"right"]].map(([h,a],i)=><div key={h} style={{fontSize:9,color:i===3?C.blue:C.muted,fontWeight:700,textAlign:a}}>{h}</div>)}
            </div>
            {keys.map((key,ii)=>{ const food=ORIGINAL_DB[key]||db[key]||{unit:"g"};const gymAmt=gym[key]||0,restAmt=rest[key]||0;
              return <div key={key} style={{display:"grid",gridTemplateColumns:"1fr auto auto auto",gap:"0 10px",padding:"9px 0",borderBottom:ii<keys.length-1?`1px solid #0a0f1e`:"none",alignItems:"center"}}>
                <div style={{fontSize:12,color:"#cbd5e1"}}>{getFoodName(key,t)}</div>
                <div style={{fontSize:11,color:gymAmt>0?C.muted:"#334155",textAlign:"right"}}>{fmtAmt(gymAmt,food.unit)}</div>
                <div style={{fontSize:11,color:restAmt>0?C.muted:"#334155",textAlign:"right"}}>{fmtAmt(restAmt,food.unit)}</div>
                <div style={{fontSize:13,fontWeight:700,color:C.text,textAlign:"right"}}>{fmtAmt(gymAmt*gymDays+restAmt*restDays,food.unit)}</div>
              </div>;
            })}
          </div>
        </div>;
      })}
    </div>
  );
};

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  // ── Language ──
  const [lang, setLang] = useState(()=>localStorage.getItem(LANG_KEY)||"uk");
  const t = TR[lang] || TR.uk;
  const toggleLang = () => {
    const next = lang==="uk"?"en":"uk";
    setLang(next);
    localStorage.setItem(LANG_KEY, next);
  };

  // ── Profiles ──
  const [profiles, setProfiles] = useState(()=>{
    try { const p=localStorage.getItem(PROFILES_KEY); if(p) return JSON.parse(p); } catch(_){}
    // default profile
    const def = [{id:"default",name:"Ruslan",emoji:"👤"}];
    localStorage.setItem(PROFILES_KEY, JSON.stringify(def));
    return def;
  });
  const [activeProfileId, setActiveProfileId] = useState(()=>localStorage.getItem(ACTIVE_KEY)||"default");
  const [showProfiles, setShowProfiles] = useState(false);

  const SK = skFor(activeProfileId);

  // ── App state (per-profile) ──
  const [tab,     setTab]     = useState("gym");
  const [toast,   setToast]   = useState(null);
  const [loading, setLoading] = useState(true);
  const [db,      setDb]      = useState(()=>DB_FACTORY());
  const [recipes, setRecipes] = useState([]);
  const [meals,   setMeals]   = useState(()=>deepClone(BUILTIN));
  const [mealRecs,setMealRecs]= useState(()=>({gym:GYM_META_KEYS.map(()=>[]),rest:REST_META_KEYS.map(()=>[])}));

  // Reload data when profile switches
  useEffect(()=>{
    setLoading(true);
    setDb(DB_FACTORY());
    setRecipes([]);
    setMeals(deepClone(BUILTIN));
    setMealRecs({gym:GYM_META_KEYS.map(()=>[]),rest:REST_META_KEYS.map(()=>[])});
    const sk = skFor(activeProfileId);
    try { const v=localStorage.getItem(sk.meals);   if(v) setMeals(JSON.parse(v)); } catch(_){}
    try { const v=localStorage.getItem(sk.db);      if(v) setDb(prev=>({...prev,...JSON.parse(v)})); } catch(_){}
    try { const v=localStorage.getItem(sk.recipes); if(v) setRecipes(JSON.parse(v)); } catch(_){}
    try { const v=localStorage.getItem(sk.mealRec); if(v) setMealRecs(JSON.parse(v)); } catch(_){}
    setLoading(false);
    setShowProfiles(false);
  }, [activeProfileId]);

  const showToast=msg=>setToast(msg);

  // ── Profile handlers ──
  const createProfile = (name) => {
    const newP = {id: genUid(), name, emoji:"👤"};
    const next = [...profiles, newP];
    setProfiles(next);
    localStorage.setItem(PROFILES_KEY, JSON.stringify(next));
    setActiveProfileId(newP.id);
    localStorage.setItem(ACTIVE_KEY, newP.id);
  };
  const deleteProfile = (id) => {
    if(!confirm(t.profiles.confirmDelete+"?")) return;
    const next = profiles.filter(p=>p.id!==id);
    setProfiles(next);
    localStorage.setItem(PROFILES_KEY, JSON.stringify(next));
    // clear that profile's data
    const sk = skFor(id);
    Object.values(sk).forEach(k=>localStorage.removeItem(k));
    if(activeProfileId===id) {
      const fallback = next[0]?.id || "default";
      setActiveProfileId(fallback);
      localStorage.setItem(ACTIVE_KEY, fallback);
    }
  };
  const switchProfile = (id) => {
    setActiveProfileId(id);
    localStorage.setItem(ACTIVE_KEY, id);
  };

  // ── Meal item handlers ──
  const updateItemAmount=useCallback((dt,mi,itemUid,val)=>{
    setMeals(prev=>{ const next=deepClone(prev); const item=next[dt][mi].find(it=>it.uid===itemUid); if(item) item.amount=val; localStorage.setItem(skFor(activeProfileId).meals,JSON.stringify(next)); return next; });
  },[activeProfileId]);
  const removeItem=useCallback((dt,mi,itemUid)=>{
    setMeals(prev=>{ const next=deepClone(prev); next[dt][mi]=next[dt][mi].filter(it=>it.uid!==itemUid); localStorage.setItem(skFor(activeProfileId).meals,JSON.stringify(next)); return next; });
  },[activeProfileId]);
  const addItem=useCallback((dt,mi,key)=>{
    const food=db[key]; const amount=food?.unit==="pcs"?1:100;
    setMeals(prev=>{ const next=deepClone(prev); next[dt][mi]=[...next[dt][mi],{key,amount,uid:genUid()}]; localStorage.setItem(skFor(activeProfileId).meals,JSON.stringify(next)); return next; });
  },[db,activeProfileId]);
  const restoreBuiltin=useCallback((dt,mi)=>{
    setMeals(prev=>{ const next=deepClone(prev); next[dt][mi]=deepClone(BUILTIN[dt][mi]); localStorage.setItem(skFor(activeProfileId).meals,JSON.stringify(next)); return next; });
    showToast(t.resetToast);
  },[activeProfileId,t]);

  // ── DB handlers ──
  const updateDb=useCallback((key,field,val)=>{
    setDb(prev=>{ const next={...prev,[key]:{...prev[key],[field]:val}}; localStorage.setItem(skFor(activeProfileId).db,JSON.stringify(next)); return next; });
  },[activeProfileId]);
  const resetDbEntry=useCallback((key)=>{
    setDb(prev=>{ const next={...prev,[key]:{...ORIGINAL_DB[key]}}; localStorage.setItem(skFor(activeProfileId).db,JSON.stringify(next)); return next; });
    showToast(t.resetFoodToast(getFoodName(key,t)));
  },[activeProfileId,t]);
  const resetDbAll=useCallback(()=>{
    setDb(DB_FACTORY()); localStorage.removeItem(skFor(activeProfileId).db);
    showToast(t.resetAllFoodsToast);
  },[activeProfileId,t]);
  const addFoodToDb=useCallback((key,food)=>{
    setDb(prev=>{ const next={...prev,[key]:food}; localStorage.setItem(skFor(activeProfileId).db,JSON.stringify(next)); return next; });
  },[activeProfileId]);

  // ── Recipe handlers ──
  const saveRecipe=useCallback((recipe)=>{
    setRecipes(prev=>{ const next=prev.find(r=>r.id===recipe.id)?prev.map(r=>r.id===recipe.id?recipe:r):[...prev,recipe]; localStorage.setItem(skFor(activeProfileId).recipes,JSON.stringify(next)); return next; });
    showToast(t.saveToast(recipe.name));
  },[activeProfileId,t]);
  const deleteRecipe=useCallback((id)=>{
    setRecipes(prev=>{ const next=prev.filter(r=>r.id!==id); localStorage.setItem(skFor(activeProfileId).recipes,JSON.stringify(next)); return next; });
    setMealRecs(prev=>{ const next={gym:prev.gym.map(m=>m.filter(mr=>mr.id!==id)),rest:prev.rest.map(m=>m.filter(mr=>mr.id!==id))}; localStorage.setItem(skFor(activeProfileId).mealRec,JSON.stringify(next)); return next; });
  },[activeProfileId]);
  const addRecipeToMeal=useCallback((dt,mi,recipeId)=>{
    setMealRecs(prev=>{ const next={...prev,[dt]:prev[dt].map((m,i)=>i===mi?[...m,{id:recipeId,scale:1,uid:genUid()}]:m)}; localStorage.setItem(skFor(activeProfileId).mealRec,JSON.stringify(next)); return next; });
  },[activeProfileId]);
  const removeRecipeFromMeal=useCallback((dt,mi,mUid)=>{
    setMealRecs(prev=>{ const next={...prev,[dt]:prev[dt].map((m,i)=>i===mi?m.filter(mr=>mr.uid!==mUid):m)}; localStorage.setItem(skFor(activeProfileId).mealRec,JSON.stringify(next)); return next; });
  },[activeProfileId]);
  const scaleRecipeInMeal=useCallback((dt,mi,mUid,scale)=>{
    setMealRecs(prev=>{ const next={...prev,[dt]:prev[dt].map((m,i)=>i===mi?m.map(mr=>mr.uid===mUid?{...mr,scale}:mr):m)}; localStorage.setItem(skFor(activeProfileId).mealRec,JSON.stringify(next)); return next; });
  },[activeProfileId]);

  const tabs=Object.entries(t.tabs).map(([id,label])=>({id,label}));
  const activeProfile = profiles.find(p=>p.id===activeProfileId)||profiles[0];

  const renderDayTab=(dt,metaKeys)=>(
    <div style={{display:"grid",gap:12}}>
      <div style={{background:"#0c1829",borderRadius:10,padding:"10px 14px",border:`1px solid ${C.border}`,fontSize:12,color:C.muted,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
        <span>⏰ {dt==="gym"?t.gymSchedule:t.restSchedule}</span>
        <span style={{fontSize:11,color:C.green}}>{t.deficit(dt==="gym"?"620":"440")}</span>
      </div>
      {metaKeys.map((mk,mi)=>(
        <MealCard key={mi} metaKey={mk}
          items={meals[dt][mi]||[]} builtinItems={BUILTIN[dt][mi]}
          mealRecs={mealRecs[dt][mi]} recipes={recipes} db={db} t={t}
          onAmountChange={(itemUid,val)=>updateItemAmount(dt,mi,itemUid,val)}
          onRemoveItem={itemUid=>removeItem(dt,mi,itemUid)}
          onAddItem={key=>addItem(dt,mi,key)}
          onRestoreBuiltin={()=>restoreBuiltin(dt,mi)}
          onAddRecipe={id=>addRecipeToMeal(dt,mi,id)}
          onRemoveRecipe={mUid=>removeRecipeFromMeal(dt,mi,mUid)}
          onScaleRecipe={(mUid,scale)=>scaleRecipeInMeal(dt,mi,mUid,scale)}
        />
      ))}
      <DayTotal mealsList={meals[dt]} mealRecsList={mealRecs[dt]} recipes={recipes} gymDay={dt==="gym"} db={db} t={t}/>
      <div style={{fontSize:11,color:"#334155",textAlign:"center"}}>{t.uncooked}</div>
    </div>
  );

  if(showProfiles) return (
    <ProfileScreen profiles={profiles} activeId={activeProfileId}
      onSelect={switchProfile} onNew={createProfile} onDelete={deleteProfile} t={t}/>
  );

  if(loading) return <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontSize:14}}>Loading…</div>;

  return(
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"'Segoe UI',system-ui,sans-serif",color:C.text,paddingBottom:50}}>
      <style>{`@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}`}</style>
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}

      {/* Header */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"14px 16px 12px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:9,fontWeight:700,color:C.blue,letterSpacing:2,marginBottom:3}}>{t.appTitle}</div>
            <div style={{fontSize:18,fontWeight:900,color:C.text}}>{t.appSubtitle}</div>
          </div>
          {/* Controls: profile + lang */}
          <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
            <button onClick={()=>setShowProfiles(true)}
              style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,fontSize:12,fontWeight:700,padding:"6px 10px",cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
              {activeProfile?.emoji} {activeProfile?.name}
            </button>
            <button onClick={toggleLang}
              style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,color:C.blue,fontSize:12,fontWeight:700,padding:"6px 10px",cursor:"pointer"}}>
              {lang==="uk"?"EN":"УКР"}
            </button>
          </div>
        </div>
        <div style={{fontSize:11,color:C.muted,marginTop:6}}>{t.recomp}</div>
      </div>

      {/* Tabs */}
      <div style={{background:C.surface,padding:"0 8px",borderBottom:`1px solid ${C.border}`,display:"flex",overflowX:"auto"}}>
        {tabs.map(tt=>(
          <button key={tt.id} onClick={()=>setTab(tt.id)} style={{background:"none",border:"none",cursor:"pointer",padding:"11px 10px",fontSize:12,fontWeight:700,color:tab===tt.id?C.blue:C.muted,borderBottom:tab===tt.id?`2px solid ${C.blue}`:"2px solid transparent",whiteSpace:"nowrap"}}>{tt.label}</button>
        ))}
      </div>

      {/* Content */}
      <div style={{padding:"14px 14px 20px",maxWidth:680,margin:"0 auto"}}>
        {tab==="gym"     && renderDayTab("gym",  GYM_META_KEYS)}
        {tab==="rest"    && renderDayTab("rest", REST_META_KEYS)}
        {tab==="supp"    && <SupplementsTab t={t}/>}
        {tab==="shop"    && <ShoppingTab meals={meals} db={db} t={t}/>}
        {tab==="food"    && <FoodEditor db={db} onUpdate={updateDb} onReset={resetDbEntry} onResetAll={resetDbAll} t={t}/>}
        {tab==="recipes" && <RecipesTab recipes={recipes} db={db} onSave={saveRecipe} onDelete={deleteRecipe} onAddFood={addFoodToDb} t={t}/>}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
